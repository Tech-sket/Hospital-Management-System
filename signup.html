{% extends 'base.html' %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <div class="text-center mb-4">

            <h2>🏥 Hospital Manager</h2>

            <p class="text-muted">
                Create your account
            </p>

        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Choose a username"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email Address
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Select Role
                </label>

                <select
                    name="role"
                    class="form-select"
                    required>

                    <option value="patient">👤 Patient</option>
                    <option value="doctor">👨‍⚕️ Doctor</option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    name="password1"
                    class="form-control"
                    placeholder="Create a password"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Confirm Password
                </label>

                <input
                    type="password"
                    name="password2"
                    class="form-control"
                    placeholder="Confirm your password"
                    required>

            </div>

            <button
                class="btn btn-primary w-100"
                type="submit">

                <i class="bi bi-person-plus-fill"></i>

                Create Account

            </button>

        </form>

        <hr>

        <div class="text-center">

            Already have an account?

            <br><br>

            <a
                href="{% url 'login' %}"
                class="btn btn-outline-primary">

                <i class="bi bi-box-arrow-in-right"></i>

                Login

            </a>

        </div>

    </div>

</div>

{% endblock %}
