service: email-service

provider:
  name: aws
  runtime: python3.9
  stage: dev
  region: us-east-1

plugins:
  - serverless-offline

functions:
  sendEmail:
    handler: handler.send_email_handler
    events:
      - http:
          path: email
          method: post
          cors: true

custom:
  serverless-offline:
    httpPort: 3000